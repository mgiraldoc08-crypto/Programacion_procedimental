<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Módulo de Contabilidad</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <script defer src="https://use.fontawesome.com/releases/v5.3.1/js/all.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f4f7fb, #e8eef7);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        .main-card {
            background: #ffffff;
            border-radius: 22px;
            padding: 2rem;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
        }

        .title {
            color: #1f2937;
            font-weight: 700;
        }

        .button.is-primary {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            border-radius: 12px;
            font-weight: 600;
        }

        .summary-card {
            border-radius: 18px;
            padding: 1.5rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .summary-card .heading {
            color: rgba(255,255,255,0.8);
        }

        .summary-card .title {
            color: white;
        }

        .income {
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        .expense {
            background: linear-gradient(135deg, #ef4444, #f87171);
        }

        .balance {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
        }

        .summary-icon {
            position: absolute;
            right: 20px;
            bottom: 10px;
            font-size: 3rem;
            opacity: 0.15;
        }

        .table-box {
            margin-top: 2rem;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }

        thead {
            background: #111827;
        }

        thead th {
            color: white !important;
        }

        .edit-btn:hover {
            background: #4f46e5 !important;
            color: white !important;
        }

        .delete-btn:hover {
            background: #ef4444 !important;
            color: white !important;
        }
    </style>
</head>

<body>

<section class="section">
    <div class="container">
        <div class="main-card">
            <div class="level">
                <div class="level-left">
                    <div class="level-item">
                        <h1 class="title">Módulo de Contabilidad</h1>
                    </div>
                </div>

                <div class="level-right">
                    <button class="button is-primary" onclick="abrirModal()">
                        <span class="icon">
                            <i class="fas fa-plus"></i>
                        </span>
                        <span>Nuevo Registro</span>
                    </button>
                </div>
            </div>

            <hr>

            <div class="columns">
                <div class="column">
                    <div class="summary-card income">
                        <p class="heading">Total Ingresos</p>
                        <p class="title" id="totalIngresos">$ 0</p>
                        <span class="summary-icon">
                            <i class="fas fa-arrow-up"></i>
                        </span>
                    </div>
                </div>

                <div class="column">
                    <div class="summary-card expense">
                        <p class="heading">Total Egresos</p>
                        <p class="title" id="totalEgresos">$ 0</p>
                        <span class="summary-icon">
                            <i class="fas fa-arrow-down"></i>
                        </span>
                    </div>
                </div>

                <div class="column">
                    <div class="summary-card balance">
                        <p class="heading">Balance Neto (Ventas)</p>
                        <p class="title" id="balance">$ 0</p>
                        <span class="summary-icon">
                            <i class="fas fa-wallet"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="box table-box">
                <div class="table-container">
                    <table class="table is-fullwidth is-hoverable">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Concepto</th>
                                <th>Tipo</th>
                                <th class="has-text-right">Valor</th>
                                <th class="has-text-centered">Acciones</th>
                            </tr>
                        </thead>

                        <tbody id="tablaRegistros">

                            <tr>
                                <td>2024-05-07</td>
                                <td>Venta de almuerzos ejecutivos</td>
                                <td>
                                    <span class="tag is-success">
                                        Ingreso
                                    </span>
                                </td>
                                <td class="has-text-right">150000</td>
                                <td class="has-text-centered">
                                    <button class="button is-small is-info edit-btn" onclick="editarRegistro(this)">
                                        <i class="fas fa-edit"></i>
                                    </button>

                                    <button class="button is-small is-danger delete-btn" onclick="eliminarRegistro(this)">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>2024-05-07</td>
                                <td>Pago de servicios (Luz)</td>
                                <td>
                                    <span class="tag is-danger">
                                        Egreso
                                    </span>
                                </td>
                                <td class="has-text-right">45000</td>
                                <td class="has-text-centered">
                                    <button class="button is-small is-info edit-btn" onclick="editarRegistro(this)">
                                        <i class="fas fa-edit"></i>
                                    </button>

                                    <button class="button is-small is-danger delete-btn" onclick="eliminarRegistro(this)">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                        </tbody>

                        <tfoot>
                            <tr>
                                <th colspan="3" class="has-text-right">
                                    Total General:
                                </th>

                                <th class="has-text-right" id="totalGeneral">
                                    $ 0
                                </th>

                                <th></th>
                            </tr>
                        </tfoot>

                    </table>
                </div>
            </div>

        </div>
    </div>
</section>
<div class="modal" id="modalRegistro">
    <div class="modal-background"></div>

    <div class="modal-card">

        <header class="modal-card-head">
            <p class="modal-card-title">Registro Contable</p>

            <button class="delete" aria-label="close" onclick="cerrarModal()"></button>
        </header>

        <section class="modal-card-body">

            <div class="field">
                <label class="label">Fecha</label>

                <div class="control">
                    <input class="input" type="date" id="fecha">
                </div>
            </div>

            <div class="field">
                <label class="label">Concepto</label>

                <div class="control">
                    <input class="input" type="text" id="concepto">
                </div>
            </div>

            <div class="field">
                <label class="label">Tipo</label>

                <div class="control">
                    <div class="select is-fullwidth">
                        <select id="tipo">
                            <option value="Ingreso">Ingreso</option>
                            <option value="Egreso">Egreso</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="field">
                <label class="label">Valor</label>

                <div class="control">
                    <input class="input" type="number" id="valor">
                </div>
            </div>

        </section>

        <footer class="modal-card-foot">
            <button class="button is-success" onclick="guardarRegistro()">
                Guardar
            </button>

            <button class="button" onclick="cerrarModal()">
                Cancelar
            </button>
        </footer>

    </div>
</div>

<script>

    let filaEditando = null;

    function abrirModal() {
        document.getElementById("modalRegistro").classList.add("is-active");
    }

    function cerrarModal() {
        document.getElementById("modalRegistro").classList.remove("is-active");

        limpiarFormulario();
    }

    function limpiarFormulario() {
        document.getElementById("fecha").value = "";
        document.getElementById("concepto").value = "";
        document.getElementById("tipo").value = "Ingreso";
        document.getElementById("valor").value = "";

        filaEditando = null;
    }

    function guardarRegistro() {

        const fecha = document.getElementById("fecha").value;
        const concepto = document.getElementById("concepto").value;
        const tipo = document.getElementById("tipo").value;
        const valor = document.getElementById("valor").value;

        if (!fecha || !concepto || !valor) {
            alert("Completa todos los campos");
            return;
        }

        const tabla = document.getElementById("tablaRegistros");

        const tagColor = tipo === "Ingreso"
            ? "is-success"
            : "is-danger";

        if (filaEditando) {

            filaEditando.cells[0].innerText = fecha;
            filaEditando.cells[1].innerText = concepto;

            filaEditando.cells[2].innerHTML =
                `<span class="tag ${tagColor}">
                    ${tipo}
                </span>`;

            filaEditando.cells[3].innerText = valor;

        } else {

            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td>${fecha}</td>

                <td>${concepto}</td>

                <td>
                    <span class="tag ${tagColor}">
                        ${tipo}
                    </span>
                </td>

                <td class="has-text-right">${valor}</td>

                <td class="has-text-centered">

                    <button class="button is-small is-info edit-btn"
                        onclick="editarRegistro(this)">

                        <i class="fas fa-edit"></i>
                    </button>

                    <button class="button is-small is-danger delete-btn"
                        onclick="eliminarRegistro(this)">

                        <i class="fas fa-trash"></i>
                    </button>

                </td>
            `;

            tabla.appendChild(fila);
        }

        actualizarTotales();

        cerrarModal();
    }

    function editarRegistro(btn) {

        filaEditando = btn.closest("tr");

        document.getElementById("fecha").value =
            filaEditando.cells[0].innerText;

        document.getElementById("concepto").value =
            filaEditando.cells[1].innerText;

        document.getElementById("tipo").value =
            filaEditando.cells[2].innerText.trim();

        document.getElementById("valor").value =
            filaEditando.cells[3].innerText;

        abrirModal();
    }

    function eliminarRegistro(btn) {

        if (confirm("¿Deseas eliminar este registro?")) {

            btn.closest("tr").remove();

            actualizarTotales();
        }
    }

    function actualizarTotales() {

        const filas = document.querySelectorAll("#tablaRegistros tr");

        let ingresos = 0;
        let egresos = 0;

        filas.forEach(fila => {

            const tipo =
                fila.cells[2].innerText.trim();

            const valor =
                parseFloat(fila.cells[3].innerText);

            if (tipo === "Ingreso") {
                ingresos += valor;
            } else {
                egresos += valor;
            }
        });

        const balance = ingresos - egresos;

        document.getElementById("totalIngresos").innerText =
            "$ " + ingresos.toLocaleString();

        document.getElementById("totalEgresos").innerText =
            "$ " + egresos.toLocaleString();

        document.getElementById("balance").innerText =
            "$ " + balance.toLocaleString();

        document.getElementById("totalGeneral").innerText =
            "$ " + balance.toLocaleString();
    }

    actualizarTotales();

</script>

</body>
</html>
